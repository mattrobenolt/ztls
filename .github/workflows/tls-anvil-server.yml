name: tls-anvil-server

on:
  workflow_dispatch:
    inputs:
      crypto_backend:
        description: libcrypto-family backend to build the ztls harnesses with
        type: choice
        options:
          - openssl
          - aws-lc
          - boringssl
        default: openssl
  schedule:
    # Weekly Wednesday 06:17 UTC. This is real suite evidence, not PR smoke.
    - cron: "17 6 * * 3"

concurrency:
  group: tls-anvil-server-${{ github.ref }}-${{ github.event.inputs.crypto_backend || 'openssl' }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

permissions:
  contents: read
  id-token: write

jobs:
  anvil-server:
    name: anvil-server (${{ matrix.crypto_backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        crypto_backend: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.crypto_backend) || '["openssl","aws-lc","boringssl"]') }}
    env:
      CRYPTO_BACKEND: ${{ matrix.crypto_backend }}
      RUN_DIR: zig-out/anvil/server/ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Build harness and TLS-Anvil tools
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            export ZTLS_CRYPTO_BACKEND="$CRYPTO_BACKEND"
            if [ "$CRYPTO_BACKEND" = aws-lc ]; then
              export PKG_CONFIG_PATH="$ZTLS_AWS_LC_PKG_CONFIG_PATH${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            elif [ "$CRYPTO_BACKEND" = boringssl ]; then
              export PKG_CONFIG_PATH="$ZTLS_BORINGSSL_PKG_CONFIG_PATH${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            fi
            cd conformance
            zig build -Dcrypto-backend="$CRYPTO_BACKEND"
            test -x zig-out/bin/tlsfuzzer_server
            test -f zig-out/tools/TLS-Anvil.jar
            test -d zig-out/tools/lib
          '

      - name: Run CI-gated conformance helper tests
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            export ZTLS_CRYPTO_BACKEND="$CRYPTO_BACKEND"
            if [ "$CRYPTO_BACKEND" = aws-lc ]; then
              export PKG_CONFIG_PATH="$ZTLS_AWS_LC_PKG_CONFIG_PATH${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            elif [ "$CRYPTO_BACKEND" = boringssl ]; then
              export PKG_CONFIG_PATH="$ZTLS_BORINGSSL_PKG_CONFIG_PATH${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            fi
            just conformance/ci
          '

      - name: Run TLS-Anvil server suite
        timeout-minutes: 100
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            export ZTLS_CRYPTO_BACKEND="$CRYPTO_BACKEND"
            if [ "$CRYPTO_BACKEND" = aws-lc ]; then
              export PKG_CONFIG_PATH="$ZTLS_AWS_LC_PKG_CONFIG_PATH${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            elif [ "$CRYPTO_BACKEND" = boringssl ]; then
              export PKG_CONFIG_PATH="$ZTLS_BORINGSSL_PKG_CONFIG_PATH${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            fi
            cd conformance
            just anvil-ci-server "$RUN_DIR" 5400
          '

      - name: Strict-normalize TLS-Anvil run
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            cd conformance
            set +e
            just anvil-report-dir "$RUN_DIR"
            status=$?
            set -e
            if [ -f "$RUN_DIR/summary.txt" ]; then
              echo "----- summary.txt -----"
              cat "$RUN_DIR/summary.txt"
            fi
            exit "$status"
          '

      - name: Upload TLS-Anvil summary and provenance
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tls-anvil-server-${{ env.CRYPTO_BACKEND }}-summary
          path: |
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/run_metadata.json
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/report.json
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/report.zip
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/report.normalized.json
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/summary.json
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/summary.txt
            conformance/zig-out/anvil/server/ci-${{ github.run_id }}/logs/
          if-no-files-found: error
          retention-days: 30

      - name: Upload TLS-Anvil per-test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tls-anvil-server-${{ env.CRYPTO_BACKEND }}-results
          path: conformance/zig-out/anvil/server/ci-${{ github.run_id }}/results/
          if-no-files-found: warn
          retention-days: 14
